<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="-52.5 -5 105 105" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Silhouette clip-path with rounded corners -->
    <clipPath id="chestClip">
      <path d="M -42 44
               L -42 10
               Q -42 8 -40.14 7.44
               L -32 5
               L 36 5
               Q 38 5 38 7
               L 38 41
               Q 38 43 36.14 43.56
               L 28 46
               L -40 46
               Q -42 46 -42 44 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#chestClip)">
    <!-- BODY right side (drawn first, behind body front) -->
    <polygon points="28,46 38,43 38,17 28,20" fill="#1E3A8A"/>

    <!-- BODY front -->
    <rect x="-42" y="20" width="70" height="26" fill="#2563EB"/>

    <!-- LID right side -->
    <polygon points="28,20 38,17 38,5 28,8" fill="#1E3A8A"/>

    <!-- LID top face -->
    <polygon points="-42,8 28,8 38,5 -32,5" fill="#60A5FA"/>

    <!-- LID front face -->
    <rect x="-42" y="8" width="70" height="12" fill="#2563EB"/>

    <!-- Seam between lid and body on front face -->
    <rect x="-42" y="19.5" width="70" height="1" fill="#1E3A8A" opacity="0.5"/>

    <!-- Seam between lid and body on right side -->
    <line x1="28" y1="20" x2="38" y2="17" stroke="#1E3A8A" stroke-width="0.5" opacity="0.5"/>

    <!-- Bar chart on body front -->
    <g fill="#60A5FA">
      <rect x="-22" y="34" width="4" height="7"/>
      <rect x="-14" y="28" width="4" height="13"/>
      <rect x="-6" y="31" width="4" height="10"/>
      <rect x="2" y="27" width="4" height="14"/>
    </g>

    <!-- Hasp clasp (extends from lid down onto body) -->
    <rect x="-11" y="8" width="8" height="16" fill="#60A5FA"/>
    <!-- Keyhole on hasp -->
    <circle cx="-7" cy="18" r="1.2" fill="#1E3A8A"/>
    <rect x="-7.5" y="18" width="1" height="2.5" fill="#1E3A8A"/>
  </g>

  <!-- Wordmark -->
  <text x="-2" y="76"
        font-family="Nunito, 'Quicksand', 'Rubik', 'Avenir Next Rounded', sans-serif"
        font-size="26"
        font-weight="700"
        fill="#1E3A8A"
        text-anchor="middle"
        letter-spacing="0.5">kestl</text>

  <!-- Tagline -->
  <text x="-2" y="91"
        font-family="Nunito, 'Quicksand', 'Rubik', 'Avenir Next Rounded', sans-serif"
        font-size="8"
        font-weight="600"
        fill="#2563EB"
        text-anchor="middle"
        textLength="66"
        lengthAdjust="spacing">HOME FINANCE</text>
</svg>
